<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8fbf9" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Gestão de tarefas domésticas da família" />
    <title>Homi</title>
    <!-- Inter, loaded without blocking first paint (system font shows meanwhile) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" />
    </noscript>
    <script>
      // Apply saved theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem('homi_theme') || 'system';
          var dark = t === 'dark' || (t === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', dark ? '#121614' : '#f8fbf9');
        } catch (e) {}
      })();
    </script>
    <style>
      /* Splash screen — styled inline so it renders before the JS bundle loads */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f8fbf9;
        color: #2e925e;
        transition: opacity 0.45s ease, visibility 0.45s ease;
      }
      html.dark #splash {
        background: #121614;
        color: #34b268;
      }
      #splash.splash-hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #splash svg {
        width: 92px;
        height: 92px;
        animation:
          splash-pop 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) both,
          splash-breathe 2.4s ease-in-out 0.75s infinite;
      }
      #splash .splash-name {
        margin-top: 14px;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.5px;
        opacity: 0;
        animation: splash-rise 0.55s ease 0.3s forwards;
      }
      @keyframes splash-pop {
        from { transform: scale(0.4); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      @keyframes splash-breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.07); }
      }
      @keyframes splash-rise {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Splash — removed by main.jsx once React has mounted -->
